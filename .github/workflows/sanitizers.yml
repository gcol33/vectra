name: ASAN/UBSAN

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitize:
    runs-on: ubuntu-latest
    name: Linux debug (ASAN + UBSAN)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # ASAN/UBSAN runtime options
      ASAN_OPTIONS: detect_leaks=0:detect_odr_violation=0
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Configure sanitizer build flags
        run: |
          mkdir -p ~/.R
          cat > ~/.R/Makevars <<'EOF'
          CC = gcc -std=gnu2x
          CFLAGS = -O1 -g -Wall -pedantic -fno-omit-frame-pointer -fsanitize=address,undefined -UNDEBUG
          CXXFLAGS = -O1 -g -Wall -pedantic -fno-omit-frame-pointer -fsanitize=address,undefined -UNDEBUG
          LDFLAGS = -fsanitize=address,undefined
          EOF
          cat ~/.R/Makevars
        shell: bash

      - name: Install package (debug + sanitized)
        run: |
          install.packages(".", repos = NULL, type = "source",
                           INSTALL_opts = "--no-multiarch")
        shell: Rscript {0}

      - name: Run tests under sanitizers
        run: |
          library(testthat)
          library(vectra)
          test_results <- test_package("vectra", reporter = "summary")
          if (any(as.data.frame(test_results)$failed > 0)) quit(status = 1)
        shell: Rscript {0}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-logs
          path: |
            /tmp/*.log
            /tmp/Rtmp*
