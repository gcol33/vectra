name: Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Smoke benchmark on every PR (non-blocking) ---
  bench-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Benchmark smoke
    continue-on-error: true

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Install vectra
        run: |
          install.packages(".", repos = NULL, type = "source",
                           INSTALL_opts = "--no-multiarch")
        shell: Rscript {0}

      - name: Run smoke benchmarks
        run: |
          library(vectra)

          set.seed(42)
          n <- 500000L
          df <- data.frame(
            id = seq_len(n) + 0.0,
            g = sample(paste0("g", seq_len(500)), n, replace = TRUE),
            x = rnorm(n), y = rnorm(n),
            stringsAsFactors = FALSE
          )
          f <- tempfile(fileext = ".vtr")
          f2 <- tempfile(fileext = ".vtr")
          on.exit(unlink(c(f, f2)))

          write_vtr(df, f)

          # B01: filter + select
          t0 <- proc.time()
          r <- tbl(f) |> filter(x > 1.5) |> select(id, x) |> collect()
          cat(sprintf("filter+select:  %.3fs (%d rows)\n",
                      (proc.time() - t0)[3], nrow(r)))

          # B04: group_by + summarise
          t0 <- proc.time()
          r <- tbl(f) |> group_by(g) |>
            summarise(sx = sum(x), n = n()) |> collect()
          cat(sprintf("group+agg:      %.3fs (%d groups)\n",
                      (proc.time() - t0)[3], nrow(r)))

          # B09: left_join
          lookup <- data.frame(
            g = paste0("g", seq_len(500)),
            label = paste0("L", seq_len(500)),
            stringsAsFactors = FALSE
          )
          write_vtr(lookup, f2)
          t0 <- proc.time()
          r <- tbl(f) |> left_join(tbl(f2), by = "g") |> collect()
          cat(sprintf("left_join:      %.3fs (%d rows)\n",
                      (proc.time() - t0)[3], nrow(r)))

          # B13: window (grouped)
          t0 <- proc.time()
          r <- tbl(f) |> group_by(g) |>
            mutate(rn = row_number(), cs = cumsum(x)) |>
            select(id, g, x, rn, cs) |> collect()
          cat(sprintf("window:         %.3fs (%d rows)\n",
                      (proc.time() - t0)[3], nrow(r)))

          cat("\nSmoke benchmarks completed successfully.\n")
        shell: Rscript {0}

  # --- Full benchmark on main branch ---
  bench-full:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Benchmark full

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Install vectra
        run: |
          install.packages(".", repos = NULL, type = "source",
                           INSTALL_opts = "--no-multiarch")
        shell: Rscript {0}

      - name: Run full benchmark suite
        run: |
          Rscript inst/benchmarks/bench_core.R
        shell: bash

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: inst/benchmarks/baseline.rds
          if-no-files-found: ignore
